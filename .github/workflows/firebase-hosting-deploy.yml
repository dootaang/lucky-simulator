name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm 모노레포로 마이그레이션(감사: CI가 삭제된 app/를 참조하던 것 교정).
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r --if-present typecheck

      - name: Tests
        run: pnpm -r --if-present test

      - name: UI design guard
        run: pnpm check:ui

      - name: Install Playwright Chromium
        run: pnpm --filter @simbot/web exec playwright install --with-deps chromium

      - name: Browser regression tests
        run: pnpm test:e2e

      - name: Build web app
        run: pnpm --filter @simbot/web build

      - name: Deploy to Firebase Hosting (live)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SIM_SIMULATOR_D1330 }}
          channelId: live
          projectId: sim-simulator-d1330
